name: Validate

on:
  push:
  pull_request:

jobs:
  skillpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/skillpack.py validate
      - run: python3 scripts/skillpack.py build
